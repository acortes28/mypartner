{% extends 'base.html' %}
{% block title %}Nueva contraseña — Finanzosos{% endblock %}
{% block main_class %}{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="text-center mb-8">
    <div class="text-4xl mb-3">🔐</div>
    <h1 class="text-xl font-bold text-gray-900">Crear nueva contraseña</h1>
  </div>

  <div class="bg-white rounded-2xl shadow-sm p-6">
    {% if error %}<p class="text-red-500 text-sm mb-4 p-3 bg-red-50 rounded-xl">{{ error }}</p>{% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nueva contraseña</label>
        <input type="password" name="password" required
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-600 text-sm">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Repetir nueva contraseña</label>
        <input type="password" name="confirm_password" required
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-600 text-sm">
      </div>
      <button type="submit"
              class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors text-sm">
        Cambiar contraseña
      </button>
    </form>
  </div>
</div>
{% endblock %}
