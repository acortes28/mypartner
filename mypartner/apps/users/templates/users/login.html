{% extends 'base.html' %}
{% block title %}Ingresar — Finanzosos{% endblock %}
{% block main_class %}{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center px-6 py-12 bg-gradient-to-b from-green-800 to-green-900">
  <!-- Logo -->
  <div class="text-center mb-10">
    <div class="text-5xl mb-3">💚</div>
    <h1 class="text-3xl font-extrabold text-white tracking-tight">Finanzosos</h1>
    <p class="text-green-300 text-sm mt-1">Gestión colaborativa de presupuestos</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl p-7">
    <h2 class="text-xl font-bold text-gray-900 mb-6">Bienvenido de vuelta</h2>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Usuario</label>
        <input type="text" name="username" required autocomplete="username" autofocus
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent text-sm transition"
               placeholder="Tu nombre de usuario">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Contraseña</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent text-sm transition"
               placeholder="Tu contraseña">
      </div>

      <button type="submit"
              class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors text-sm shadow-sm">
        Ingresar
      </button>
    </form>

    <div class="mt-5 space-y-3">
      <a href="{% url 'password-recovery' %}"
         class="block text-center text-sm text-gray-500 hover:text-gray-700 transition-colors">
        Olvidé mi contraseña
      </a>
      <div class="border-t border-gray-100 pt-3">
        <a href="{% url 'register' %}"
           class="block w-full py-3 text-center text-green-700 font-bold border-2 border-green-700 rounded-xl hover:bg-green-50 transition-colors text-sm">
          Registrarme
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
