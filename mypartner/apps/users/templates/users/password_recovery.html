{% extends 'base.html' %}
{% block title %}Recuperar contraseña — Finanzosos{% endblock %}
{% block main_class %}{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'login' %}" class="p-2 text-gray-500 hover:text-gray-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-xl font-bold text-gray-900">Recuperar contraseña</h1>
  </div>

  <div class="bg-white rounded-2xl shadow-sm p-6">
    <div class="text-center mb-6">
      <div class="text-4xl mb-3">🔑</div>
      <p class="text-gray-600 text-sm">Ingresa tu correo electrónico y te enviaremos un enlace para cambiar tu contraseña.</p>
    </div>

    <form method="post" x-data="{ email: '', get validEmail() { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.email); } }" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Correo electrónico</label>
        <input type="email" name="email" required x-model="email"
               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-600 text-sm"
               placeholder="tu@correo.com">
      </div>
      <button type="submit" :disabled="!validEmail"
              :class="validEmail ? 'bg-blue-600 hover:bg-blue-700 cursor-pointer' : 'bg-gray-200 text-gray-400 cursor-not-allowed'"
              class="w-full py-3.5 text-white font-bold rounded-xl transition-colors text-sm">
        Enviar correo de recuperación
      </button>
    </form>

    <a href="{% url 'login' %}"
       class="block w-full py-3 mt-3 text-center text-gray-600 font-semibold border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-sm">
      Cancelar
    </a>
  </div>
</div>
{% endblock %}
